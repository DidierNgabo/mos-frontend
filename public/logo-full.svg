<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" width="340" height="100">
  <title>Outreach Medical</title>
  <!-- Icon mark -->
  <rect x="0" y="6" width="88" height="88" rx="18" fill="#185FA5"/>
  <!-- Cross horizontal -->
  <rect x="12" y="40" width="64" height="20" rx="4" fill="#ffffff"/>
  <!-- Cross vertical -->
  <rect x="30" y="18" width="20" height="64" rx="4" fill="#ffffff"/>
  <!-- ECG pulse line -->
  <polyline points="0,68 16,68 24,52 32,84 40,68 88,68"
    fill="none" stroke="#1D9E75" stroke-width="3.5"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wordmark -->
  <text x="106" y="48" font-family="Arial, Helvetica, sans-serif"
    font-weight="700" font-size="34" fill="#185FA5" letter-spacing="-0.5">Outreach</text>
  <text x="108" y="72" font-family="Arial, Helvetica, sans-serif"
    font-weight="400" font-size="16" fill="#1D9E75" letter-spacing="4">MEDICAL</text>
  <text x="108" y="90" font-family="Arial, Helvetica, sans-serif"
    font-weight="400" font-size="11" fill="#888780" letter-spacing="0.5">Community health. Delivered.</text>
</svg>
